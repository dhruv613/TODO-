<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tobo List</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar glass">
      <div class="sidebar-header">
        <div class="app-icon">
          <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="10" fill="url(#g1)"/><path d="M9 16l5 5 9-9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="g1" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse"><stop stop-color="#7C3AED"/><stop offset="1" stop-color="#DB2777"/></defs></svg>
        </div>
        <div class="app-title">
          <h1>Tobo List</h1>
          <p class="subtitle" id="today-date"></p>
        </div>
      </div>

      <!-- User badge -->
      <div class="user-badge">
        <div class="avatar">{{ user.username[0]|upper }}</div>
        <div class="user-info">
          <span class="user-name">{{ user.username }}</span>
          <span class="user-id">{{ user.id }}</span>
        </div>
        <button class="logout-btn" id="logout-btn" title="Sign out">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 011 1v12a1 1 0 11-2 0V4a1 1 0 011-1zm7.707 3.293a1 1 0 010 1.414L9.414 9H17a1 1 0 110 2H9.414l1.293 1.293a1 1 0 01-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
        </button>
      </div>

      <!-- Stats ring -->
      <div class="stats-ring-wrap">
        <svg class="ring-svg" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="48" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="10"/>
          <circle id="ring-progress" cx="60" cy="60" r="48" fill="none" stroke="url(#rg)" stroke-width="10"
            stroke-linecap="round" stroke-dasharray="301.59" stroke-dashoffset="301.59"
            transform="rotate(-90 60 60)"/>
          <defs>
            <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#7C3AED"/>
              <stop offset="100%" stop-color="#DB2777"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="ring-label">
          <span id="ring-pct">0%</span>
          <small>done</small>
        </div>
      </div>

      <!-- Quick stats -->
      <div class="quick-stats">
        <div class="stat-chip"><span id="stat-total">0</span><label>Total</label></div>
        <div class="stat-chip"><span id="stat-pending">0</span><label>Pending</label></div>
        <div class="stat-chip"><span id="stat-done">0</span><label>Done</label></div>
      </div>

      <!-- Category filter -->
      <nav class="cat-nav">
        <p class="nav-label">Categories</p>
        <button class="cat-btn active" data-cat="all">
          <span class="cat-icon">📋</span> All
          <span class="cat-count" id="cat-count-all">0</span>
        </button>
        <button class="cat-btn" data-cat="personal">
          <span class="cat-icon">🏠</span> Personal
          <span class="cat-count" id="cat-count-personal">0</span>
        </button>
        <button class="cat-btn" data-cat="work">
          <span class="cat-icon">💼</span> Work
          <span class="cat-count" id="cat-count-work">0</span>
        </button>
        <button class="cat-btn" data-cat="shopping">
          <span class="cat-icon">🛒</span> Shopping
          <span class="cat-count" id="cat-count-shopping">0</span>
        </button>
        <button class="cat-btn" data-cat="health">
          <span class="cat-icon">❤️</span> Health
          <span class="cat-count" id="cat-count-health">0</span>
        </button>
      </nav>

      <button class="clear-btn glass-btn" id="clear-completed-btn">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9z" clip-rule="evenodd"/></svg>
        Clear Completed
      </button>
    </aside>

    <!-- Main content -->
    <main class="main-content">

      <!-- Top bar -->
      <div class="topbar">
        <div class="search-wrap glass">
          <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
          <input type="text" id="search-input" placeholder="Search tasks…" />
        </div>
        <div class="filter-wrap">
          <select id="priority-filter" class="glass-select">
            <option value="all">All Priority</option>
            <option value="high">🔴 High</option>
            <option value="medium">🟡 Medium</option>
            <option value="low">🟢 Low</option>
          </select>
          <select id="sort-select" class="glass-select">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="priority">Priority</option>
            <option value="due">Due Date</option>
          </select>
        </div>
        <button class="add-fab" id="open-modal-btn" title="Add Task">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      <!-- Pinned section -->
      <section id="pinned-section" style="display:none">
        <div class="section-header">
          <svg viewBox="0 0 20 20" fill="currentColor" style="width:16px"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
          Pinned
        </div>
        <div class="todo-list" id="pinned-list"></div>
      </section>

      <!-- All todos section -->
      <section>
        <div class="section-header">
          <svg viewBox="0 0 20 20" fill="currentColor" style="width:16px"><path fill-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h7a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
          Tasks
        </div>
        <div class="todo-list" id="todo-list">
          <div class="empty-state" id="empty-state">
            <div class="empty-icon">✅</div>
            <p>No tasks yet — add one!</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Add / Edit Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal glass" id="modal">
      <div class="modal-handle"></div>
      <h2 id="modal-title">New Task</h2>

      <div class="field-group">
        <label>Task Title *</label>
        <input type="text" id="task-title" placeholder="What needs to be done?" maxlength="120" />
        <span class="char-count" id="char-count">0/120</span>
      </div>

      <div class="field-group">
        <label>Description</label>
        <textarea id="task-desc" placeholder="Add details…" rows="3"></textarea>
      </div>

      <div class="row-fields">
        <div class="field-group">
          <label>Priority</label>
          <div class="priority-pills" id="priority-pills">
            <button class="pill" data-val="low">🟢 Low</button>
            <button class="pill active" data-val="medium">🟡 Med</button>
            <button class="pill" data-val="high">🔴 High</button>
          </div>
        </div>
        <div class="field-group">
          <label>Category</label>
          <select id="task-category" class="glass-select">
            <option value="personal">🏠 Personal</option>
            <option value="work">💼 Work</option>
            <option value="shopping">🛒 Shopping</option>
            <option value="health">❤️ Health</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label>Due Date</label>
        <input type="date" id="task-due" class="glass-select" />
      </div>

      <div class="modal-actions">
        <button class="glass-btn cancel-btn" id="cancel-modal-btn">Cancel</button>
        <button class="submit-btn" id="submit-btn">Add Task</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
